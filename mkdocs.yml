
# Project Information
site_name: Kaushik's SecondBrain
site_url: https://thekaushikls.github.io/SecondBrain
site_author: Kaushik LS
site_description: >-
    Personal knowledge management using the Zettelkasten method.

# Repository Information
repo_name: thekaushikls/SecondBrain
repo_url: https://github.com/thekaushikls/SecondBrain

# Copyright Information
copyright: Copyright &copy; 2016 - 2023 Kaushik LS


#watch: ['docs', 'mkdocs.yml', 'custom_theme']
plugins:
    - search:
        indexing: 'full'

markdown_extensions:
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.keys
    - pymdownx.superfences 
    - tables
    - toc
    - pymdownx.tasklist:
        custom_checkbox: true
        clickable_checkbox: true
    - footnotes        

theme:
    name: material
    highlightjs: true
    github_url: https://github.com/thekaushikls/SecondBrain
    navigation_depth: 4
    titles_only: true
    sticky_navigation: true
    collapse_navigation: true
    #custom_dir: custom_theme
    theme:
    logo: Resources\Icons_brain_512x512.png
    favicon: Resources\Icons_brain_512x512.png
    palette:
       # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
            # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode


 